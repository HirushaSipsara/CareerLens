<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Teal/Cyan Gradient for Lens -->
    <linearGradient id="tealGrad" x1="45" y1="35" x2="135" y2="125" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Amber/Orange Gradient for Trend Arrow -->
    <linearGradient id="accentGrad" x1="40" y1="130" x2="140" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0a500" />
      <stop offset="50%" stop-color="#ff7b00" />
      <stop offset="100%" stop-color="#ff5100" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="180" height="180" rx="40" fill="url(#bgGrad)" stroke="#1f2937" stroke-width="2" />

  <!-- Grid Accents (Tech/Data Theme) -->
  <line x1="30" y1="0" x2="30" y2="180" stroke="#1f2937" stroke-width="0.75" stroke-dasharray="4 4" />
  <line x1="150" y1="0" x2="150" y2="180" stroke="#1f2937" stroke-width="0.75" stroke-dasharray="4 4" />
  <line x1="0" y1="30" x2="180" y2="30" stroke="#1f2937" stroke-width="0.75" stroke-dasharray="4 4" />
  <line x1="0" y1="150" x2="180" y2="150" stroke="#1f2937" stroke-width="0.75" stroke-dasharray="4 4" />

  <!-- Trend Line (Career Growth Pathway) -->
  <path d="M35 135 L75 95 L105 105 L145 55" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Trend Arrow Head -->
  <path d="M125 55 H145 V75" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />

  <!-- The Lens (Outer Ring with Glow) -->
  <circle cx="95" cy="85" r="38" stroke="url(#tealGrad)" stroke-width="7" filter="url(#glow)" />
  <circle cx="95" cy="85" r="38" stroke="url(#tealGrad)" stroke-width="5" />
  <circle cx="95" cy="85" r="30" stroke="#00f2fe" stroke-dasharray="5 3" stroke-width="1.5" opacity="0.6" />

  <!-- Lens Handle -->
  <line x1="68" y1="112" x2="45" y2="135" stroke="url(#tealGrad)" stroke-width="8" stroke-linecap="round" />
  <line x1="68" y1="112" x2="52" y2="128" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.4" />

  <!-- Decorative Reflection/Glint on the Lens -->
  <path d="M115 65 A 28 28 0 0 1 123 85" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.5" />
</svg>